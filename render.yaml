services:
  - type: web
    name: shopnest-web
    env: node
    branch: main
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    env:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: ''
      - key: JWT_SECRET
        value: ''
      - key: GMAIL_USER
        value: ''
      - key: GMAIL_PASS
        value: ''
      - key: RAZORPAY_KEY_ID
        value: ''
      - key: RAZORPAY_KEY_SECRET
        value: ''
      - key: FRONTEND_URL
        value: ''
